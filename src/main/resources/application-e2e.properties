spring.datasource.url=jdbc:h2:mem:vargasvet_e2e;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.generate-ddl=true

jwt.private-key=classpath:keys/e2e_private_key.pem
jwt.public-key=classpath:keys/e2e_public_key.pem
jwt.validity-in-seconds=3600
jwt.refresh-validity-in-seconds=7200
jwt.absolute-timeout-seconds=7200

app.url=http://127.0.0.1:4200
app.frontend.verify-url=${app.url}/auth/verify/
app.frontend.login-url=${app.url}/login
app.cookie.secure=false
app.cookie.same-site=Lax
cors.allowed-origins=http://127.0.0.1:4200,http://localhost:4200

spring.mail.host=127.0.0.1
spring.mail.port=2526
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.connectiontimeout=200
spring.mail.properties.mail.smtp.timeout=200
spring.mail.properties.mail.smtp.writetimeout=200
app.mail.from=e2e@vargasvet.test

supabase.url=http://127.0.0.1:8080/api/v1/setup/e2e
supabase.service-role-key=e2e-not-used
supabase.bucket=e2e

ia.laboratorio.url=http://127.0.0.1:8080/api/v1/setup/e2e
ia.radiografia.url=http://127.0.0.1:8080/api/v1/setup/e2e

mercadopago.access-token=TEST-E2E-NOT-USED
mercadopago.public-key=TEST-E2E-NOT-USED
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework.mail=OFF

spring.application.name=vargasvet
server.servlet.context-path=/api/v1

# Configuración para PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/vargasvet_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Sebastianalonso19}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true

jwt.validity-in-seconds=259200
jwt.private-key=classpath:keys/private_key.pem
jwt.public-key=classpath:keys/public_key.pem

# ============================================================
# CONFIGURACION DE CORREO (SMTP GMAIL)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.writetimeout=3000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.protocol=smtp

# ============================================================
# OAUTH2 - GOOGLE
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL:http://localhost:8080}/api/v1/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ============================================================
# CONFIGURACION DE LA APLICACION
# ============================================================
app.url=http://localhost:8080/api/v1
app.company.name=Patitas Felices
app.company.email=soporte@patitasfelices.com
app.company.phone=+51 999 888 777
app.company.address=Av. Veterinaria 123, Lima, Perú
app.company.logo=https://i.postimg.cc/xTJ77LFz/images.png

# Almacenamiento de archivos
storage.location=uploads
